spring.datasource.url=${TEST_DB_URL:jdbc:mysql://localhost:3306/db_pasantias?useSSL=false&serverTimezone=America/Argentina/Buenos_Aires&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true&connectionCollation=utf8mb4_unicode_ci}
spring.datasource.username=${TEST_DB_USER:root}
spring.datasource.password=${TEST_DB_PASS:my-secret-pw}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis mapper locations
mybatis.mapper-locations=classpath*:mapper/*.xml

# Do not run default Spring SQL initialization; tests will run schema via @Sql
spring.sql.init.mode=never
