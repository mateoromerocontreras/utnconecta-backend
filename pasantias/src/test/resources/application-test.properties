# Test Configuration - H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.seminario.pasantias.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-fetch-size=100
mybatis.configuration.default-statement-timeout=30

# Initialize database schema
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=
spring.sql.init.continue-on-error=true

# JWT Configuration (for tests)
jwt.secret=testSecretKeyForJWTTokenGenerationThatShouldBeLongEnoughAndSecure123456789
jwt.expiration=3600

# Mail Configuration (disabled for tests)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
app.mail.from=test@example.com
app.verification.base-url=http://localhost:8080/auth/confirmar?token=
app.verification.expiration-hours=24

# HTTP Encoding
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# Disable security for some tests (can be overridden in specific test classes)
spring.security.user.name=test
spring.security.user.password=test

