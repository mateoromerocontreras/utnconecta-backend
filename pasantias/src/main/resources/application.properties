#App Data
spring.application.name=pasantias Grupo 10
apiinfo.description=Aplicacion web para gestionar pasantias
apiinfo.version=1.0

spring.datasource.url=jdbc:mysql://localhost:3306/db_pasantias?useSSL=false&serverTimezone=America/Argentina/Buenos_Aires&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true&connectionCollation=utf8mb4_unicode_ci

# Credenciales
spring.datasource.username=root
spring.datasource.password=my-secret-pw

# Driver JDBC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.main.allow-bean-definition-overriding=true

# JWT Configuration
jwt.secret=myVerySecretKeyForJWTTokenGenerationThatShouldBeLongEnoughAndSecure123456789
jwt.expiration=3600

# Mail (valores listos para Gmail; sobreescribelos con variables de entorno)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS:true}
app.mail.from=${MAIL_FROM:ezesedlacek12@gmail.com}
app.verification.base-url=${VERIFICATION_BASE_URL:http://localhost:8080/auth/confirmar?token=}
app.verification.expiration-hours=${VERIFICATION_EXPIRATION_HOURS:24}

# HTTP Encoding
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.seminario.pasantias.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-fetch-size=100
mybatis.configuration.default-statement-timeout=30
