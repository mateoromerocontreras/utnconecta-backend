#App Data
spring.application.name=pasantias Grupo 10
apiinfo.description=Aplicacion web para gestionar pasantias
apiinfo.version=1.0

spring.datasource.url=jdbc:mysql://localhost:3306/db_pasantias?useSSL=false&serverTimezone=America/Argentina/Buenos_Aires&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true

# Credenciales
spring.datasource.username=root
spring.datasource.password=my-secret-pw

# Driver JDBC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.main.allow-bean-definition-overriding=true

# JWT Configuration
jwt.secret=myVerySecretKeyForJWTTokenGenerationThatShouldBeLongEnoughAndSecure123456789
jwt.expiration=3600

# HTTP Encoding
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
